server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.html;

    # API do Laravel
    location /api {
        try_files $uri /index.php?$query_string;
    }

    # Entrypoint PHP (Laravel)
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Assets do SPA: referenciados em /assets, servidos fisicamente de /spa/assets
    location ~* \.(?:css|js|map|jpe?g|png|gif|ico|svg|woff2?|ttf|eot)$ {
        try_files /spa$uri $uri =404;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # SPA: serve o dist e faz fallback para index.html (client-side routing)
    location / {
        root /var/www/public/spa;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
