services:
    app:
        build:
            context: .
            dockerfile: Dockerfiles/laravel/Dockerfile
            args:
                user: laravel
                uid: 1000
        container_name: conecta-sus-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        depends_on:
            - db
        env_file: .env
        networks:
            - conecta-sus

    nginx:
        image: nginx:alpine
        container_name: conecta-sus-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
            - ./frontend-dist:/var/www/public/spa
        depends_on:
            - app
        networks:
            - conecta-sus

    db:
        image: mysql:8.0
        container_name: conecta-sus-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laravel}
            MYSQL_USER: ${DB_USERNAME:-test}
            MYSQL_PASSWORD: ${DB_PASSWORD:-test}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3306:3306"
        networks:
            - conecta-sus

    frontend:
        build:
            context: .
            dockerfile: Dockerfiles/frontend/Dockerfile
        container_name: conecta-sus-frontend
        volumes:
            - .:/app
            - frontend_dist:/app/dist
        command: sh -c "npm install && npm run build:standalone"
        networks:
            - conecta-sus

volumes:
    db_data:
    frontend_dist:

networks:
    conecta-sus:
        driver: bridge
