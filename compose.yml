services:
    app:
        build:
            context: .
            dockerfile: Dockerfiles/laravel/Dockerfile
            args:
                user: ${DOCKER_USER:-laravel}
                uid: ${DOCKER_USER_ID:-1000}
        container_name: conecta-sus-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        depends_on:
            db:
                condition: service_healthy
            frontend:
                condition: service_completed_successfully
        env_file: .env
        networks:
            - conecta-sus

    nginx:
        image: nginx:alpine
        container_name: conecta-sus-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./infra/http/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            app:
                condition: service_started
            frontend:
                condition: service_completed_successfully
        networks:
            - conecta-sus

    db:
        image: mysql:8.0
        container_name: conecta-sus-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laravel}
            MYSQL_USER: ${DB_USERNAME:-test}
            MYSQL_PASSWORD: ${DB_PASSWORD:-test}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - conecta-sus

    frontend:
        build:
            context: .
            dockerfile: Dockerfiles/frontend/Dockerfile
            args:
                uid: ${DOCKER_USER_ID:-1000}
        container_name: conecta-sus-frontend
        volumes:
            - .:/app
        command: sh -c "npm install && npm run build:standalone"
        networks:
            - conecta-sus

volumes:
    db_data:

networks:
    conecta-sus:
        driver: bridge
